name: GetManager

permissions:
  contents: write
  actions: read

on:
  workflow_call:
    inputs:
      kernelsu_variant:
        required: true
        type: string

jobs:
  get_ksu_manager:
    runs-on: ubuntu-latest
    env:
      CCACHE_COMPILERCHECK: "%compiler% -dumpmachine; %compiler% -dumpversion"
      CCACHE_NOHASHDIR: "true"
      CCACHE_HARDLINK: "true"
      GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

    steps:
      - name: Install dependencies
        run: sudo apt update && sudo apt upgrade -y && sudo apt install -y git curl jq unzip

      - name: Set KernelSU manager version
        run: |
          if [ "${{ inputs.kernelsu_variant }}" == "Next" ]; then
            echo "This is the Next variant"
            git clone https://github.com/KernelSU-Next/KernelSU-Next.git
            cd KernelSU-Next
            KSU_GIT_VERSION=$(git rev-list --count HEAD)
            KSU_VERSION=$((10000 + KSU_GIT_VERSION + 200))
            echo "$KSU_VERSION"
            echo "KSU_VERSION=$KSU_VERSION" >> "$GITHUB_ENV"
          elif [ "${{ inputs.kernelsu_variant }}" == "SukiSU" ]; then
            echo "This is the SukiSU variant"
            git clone https://github.com/SukiSU-Ultra/SukiSU-Ultra.git
            cd SukiSU-Ultra
            KSU_GIT_VERSION=$(git rev-list --count HEAD)
            KSU_VERSION=$((10000 + KSU_GIT_VERSION + 700))
            echo "$KSU_VERSION"
            echo "KSU_VERSION=$KSU_VERSION" >> "$GITHUB_ENV"
          else
            echo "Manager download is only supported for Next and SukiSU."
          fi

      - name: Download KernelSU manager
        if: ${{ inputs.kernelsu_variant == 'Next' || inputs.kernelsu_variant == 'SukiSU' }}
        run: |
          if [ "${{ inputs.kernelsu_variant }}" == "Next" ]; then
            echo "KernelSU Next..."
            REPO="KernelSU-Next/KernelSU-Next"
            FILENAME="build-manager-ci.yml"
          else
            echo "SukiSU..."
            REPO="SukiSU-Ultra/SukiSU-Ultra"
            FILENAME="build-manager.yml"
          fi

          if [ -z "${GH_TOKEN:-}" ]; then
            echo "GH_TOKEN is empty. Add a GH_PAT repository secret or enable GITHUB_TOKEN access."
            exit 1
          fi

          BUILD_ID=$(curl -fsSL \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$REPO/actions/workflows/$FILENAME/runs?status=success&per_page=1" | \
            jq -r '.workflow_runs[0].id')
          echo "BUILD_ID=$BUILD_ID"
          if [ -z "$BUILD_ID" ] || [ "$BUILD_ID" = "null" ]; then
            echo "No successful manager workflow run found for $REPO/$FILENAME"
            exit 1
          fi

          ARTIFACTS=$(curl -fsSL \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$REPO/actions/runs/$BUILD_ID/artifacts")
          echo "Available artifacts:"
          echo "$ARTIFACTS" | jq -r '.artifacts[].name'

          DOWNLOAD_URL=$(echo "$ARTIFACTS" | jq -r '.artifacts[] | select(.name | ascii_downcase == "manager") | .archive_download_url' | head -n 1)
          if [ -z "$DOWNLOAD_URL" ] || [ "$DOWNLOAD_URL" = "null" ]; then
            echo "No manager artifact found for $REPO run $BUILD_ID"
            exit 1
          fi

          MANAGER_ZIP="${{ inputs.kernelsu_variant }}-Manager(${{ env.KSU_VERSION }}).zip"
          curl -fL \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -o "$MANAGER_ZIP" \
            "$DOWNLOAD_URL"
          echo "Manager file downloaded as: $MANAGER_ZIP"
          unzip "$MANAGER_ZIP"

      - name: Upload manager artifact
        if: ${{ inputs.kernelsu_variant == 'Next' || inputs.kernelsu_variant == 'SukiSU' }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.kernelsu_variant }}-Manager(${{ env.KSU_VERSION }})
          path: |
            *.apk
